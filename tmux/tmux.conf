#unbind default keymap
unbind -n Left
unbind -n Right
unbind -n Up
unbind -n Down
unbind C-b
unbind %
unbind '"'
unbind r
# change indexing to more human redable 
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
# colors config
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
#clipboard
set -g set-clipboard on
#enable status bar 
set -g status "on"
#status bar config
set -g status-justify "left"
# set prefix to Alt+b
set -g prefix M-b
bind-key M-b send-prefix
# open/close window
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-w kill-pane
bind -n M-q kill-window
# open panels
bind -n M-r split-window -h -c "#{pane_current_path}"
bind -n M-f split-window -v -c "#{pane_current_path}"
# reload config
bind -n M-R source-file $HOME/.config/tmux/tmux.conf
#pane movment
bind -n M-Left  select-pane -L
bind -n M-Down  select-pane -D
bind -n M-Up    select-pane -U
bind -n M-Right select-pane -R
# alt+x window selection
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
